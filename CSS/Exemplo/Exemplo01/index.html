<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 01: Hello Word</title>
    <style>
        body {
            /* Ativar o flexbox para o alinhamento */
            display: flex;

            /* centralizar horizontalmente o conteúdo */
            justify-content: center;

            /* centralizar verticalmente o conteúdo */
            align-items: center;

            /* definir a altura como 100% da tela da tela */
            height: 100vh;

            /* definir a cor de fundo */
            background-color: #b5b5b5;

            /* definir a cor do texto */
            font-family: Georgia, 'Times New Roman', Times, serif, Helvetica, sans-serif;
        }

        /* Estilo aplicados ao titulo (h1) */
        h1 {
            /* cor do texto */
           color: rgb(10, 124, 238);

           font-size: 32px;

           /* definir o alinhamento do texto */
           text-align: center;

           /* borda azul */
           /* Double serve para criar um efeito de borda dupla */
           border: 10px double #1a077b;

           /* adicionar um preenchimento interno */
           padding: 20px 40px;

           /* adicionar um espaçamento entre o texto e a borda */
           border-radius: 40px;

           /* fundo  para destacar o nome hello world dentro da borda */
           background-color: #FFF;

        }
    </style>

</head>
<body>
        <!-- ctrl + ; faz acontacer o comentario -->
  <h1>Hello World</h1>
</body>
</html>
