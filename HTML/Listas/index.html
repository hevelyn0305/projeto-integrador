<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listats</title>

</head>
<body>
    <h1>Listas ordenadas e não ordenadas</h1>
    <p>Os elementos de listas HTML organiza conteúdos usandos tags especificas:</p>


    <h2>Listas não ordenadas (Unordered Lists)</h2>
    <!-- Criar uma lista não ordenada, geralmente exibida com marcadores (bolinhas/círculos)-->

    <ul><!--Unordered Lists "<ul>" -->

        <li>Geladeira</li><!--Item de listas "<li>"-->
        <li>Fogão</li><!--Item de listas "<li>"-->
        <li>Micro-ondas</li><!--Item de listas "<li>"-->
    </ul>

    <h2>Listas ordenadas (Ordered Lists)</h2>
    <!-- Criar uma lista ordenada, geralmente exibida com números -->

    <ol type="I"><!--Ordered Lists "<ol>" -->
        <!--para mudar o tipo de numeração, altere o atributo "type="a" ou número da minha preferência-->

        <li>Lava-louças</li><!--Item de listas "<li>"-->
        <li>Aspirador de pó</li><!--Item de listas "<li>"-->
        <li>Computador</li><!--Item de listas "<li>"-->
    </ol><!--Ordered Lists "<ol>"-->
</body>
</html>
